```svg
<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024">
      <stop offset="0%" stop-color="#071B44"/>
      <stop offset="100%" stop-color="#00112B"/>
    </linearGradient>

    <linearGradient id="cube" x1="250" y1="180" x2="760" y2="760">
      <stop offset="0%" stop-color="#42B6FF"/>
      <stop offset="100%" stop-color="#0047FF"/>
    </linearGradient>

    <linearGradient id="letter" x1="250" y1="200" x2="520" y2="760">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C9D7FF"/>
    </linearGradient>

    <filter id="glow" x="0" y="0" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <g filter="url(#glow)">
    <path d="M610 220L790 330V690L610 800L430 690V330L610 220Z" fill="url(#cube)"/>

