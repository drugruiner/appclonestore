    <path d="M285 245C285 220 305 200 330 200H450C585 200 670 270 670 390C670 470 625 530 545 560L660 760C675 785 660 820 625 820H555C530 820 515 810 505 790L410 610H375V770C375 798 353 820 325 820H285C257 820 235 798 235 770V245H285ZM375 340V495H445C515 495 560 465 560 415C560 365 515 340 445 340H375Z" fill="url(#letter)"/>
  </g>
</svg>
```

Замени этим SVG старую иконку в проекте.

Сохрани как:

* `public/icon.svg`

И подключи в `index.html`:

```html
<link rel="icon" type="image/svg+xml" href="/appclonestore/icon.svg" />
<link rel="apple-touch-icon" href="/appclonestore/icon.svg" />
```
